<div class="fade-in">
    <div class="flex justify-between items-center mb-4">
        <h1>Inventory Catalog</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" onclick="window.generateDemoProduct()" style="background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.3);">+ Add Demo Product</button>
            <button class="btn btn-primary" onclick="window.clearDemoProducts()" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.3);">Clear Demo Products</button>
            <input type="file" id="csv-upload" accept=".csv" multiple style="display: none;" onchange="window.handleCSVUpload(event)">
            <button class="btn btn-primary" style="background: #3b82f6;" onclick="document.getElementById('csv-upload').click()">📁 Upload Demo CSV</button>
            <button class="btn btn-primary" onclick="window.showProductModal()">+ Add Product</button>
        </div>
    </div>

    <div class="card" style="padding: 0;">
        <div class="table-container" style="margin-top: 0;">
            <table class="table" id="products-table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Sell Price</th>
                        <th>Stock Qty</th>
                        <th>Brand/Supplier</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Injected via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit Product Modal Restored -->
<div class="modal-overlay" id="product-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="product-modal-title">Add Product</h3>
            <button class="modal-close" onclick="window.closeProductModal()">&times;</button>
        </div>
        <form id="product-form">
            <input type="hidden" id="product-id">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="product-name" class="form-control" required>
            </div>
            <div class="grid-2" style="gap: 1rem;">
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" id="product-price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Min Stock Level</label>
                    <input type="number" id="product-min-stock" class="form-control" value="10" required>
                </div>
            </div>
            <div class="grid-2" style="gap: 1rem;">
                <div class="form-group">
                    <label>Initial Stock (HYD Hub)</label>
                    <input type="number" id="product-qty" class="form-control" value="0" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="product-desc" class="form-control" rows="1"></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary mt-4" style="width: 100%;">Save Product</button>
        </form>
    </div>
</div>

<script>
    let currentProducts = [];

    window.initProducts = async function() {
        

        await loadProducts();
        
        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('product-id').value;
            const data = {
                name: document.getElementById('product-name').value,
                price: parseFloat(document.getElementById('product-price').value),
                description: document.getElementById('product-desc').value,
                category_id: Math.floor(Math.random() * 3) + 1, // Safe fallback default category 
                initial_stock: parseInt(document.getElementById('product-qty').value) || 0
            };
            
            try {
                if (id) await ApiService.updateProduct(id, data);
                else await ApiService.createProduct(data);
                
                window.app.showToast('Product saved successfully');
                closeProductModal();
                loadProducts();
            } catch (err) { window.app.showToast(err.message, 'error'); }
        });
    }

    window.handleCSVUpload = async function(event) {
        const files = event.target.files;
        if (!files || files.length === 0) return;

        window.app.showToast(`Processing ${files.length} file(s)...`, 'success');

        for (let f = 0; f < files.length; f++) {
            const file = files[f];
            const text = await file.text();
            
            const lines = text.split('\\n').filter(line => line.trim().length > 0);
            if (lines.length < 2) continue;

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const nameIdx = headers.findIndex(h => h.includes('name') || h.includes('product'));
            const priceIdx = headers.findIndex(h => h.includes('price') || h.includes('cost') || h.includes('sell'));
            const qtyIdx = headers.findIndex(h => h.includes('qty') || h.includes('quantity') || h.includes('stock'));

            if (nameIdx === -1) continue;

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim());
                if(values.length < 2) continue;
                
                const data = {
                    name: values[nameIdx] ? values[nameIdx].replace(/^"|"$/g, '') : '',
                    price: priceIdx !== -1 && values[priceIdx] ? parseFloat(values[priceIdx].replace(/[^0-9.-]+/g,"")) || 0 : 0,
                    quantity: qtyIdx !== -1 && values[qtyIdx] ? parseInt(values[qtyIdx].replace(/[^0-9-]+/g,"")) || 0 : 0,
                    min_stock: 10,
                    supplier_id: null
                };
                
                try { await ApiService.createProduct(data); } 
                catch(err) { console.error('Row failed:', err); }
            }
        }

        window.app.showToast('All Demo Data Uploaded Successfully!', 'success');
        loadProducts();
        event.target.value = ''; 
    };

    async function loadProducts() {
        try {
            currentProducts = await ApiService.getProducts();
            renderProducts(currentProducts);
        } catch (err) { window.app.showToast('Failed to load products', 'error'); }
    }

    function renderProducts(products) {
        const tbody = document.querySelector('#products-table tbody');
        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #6b7280; padding: 20px;">No products found</td></tr>';
            return;
        }
        tbody.innerHTML = products.map(p => `
            <tr>
                <td style="color: #6b7280;">prod${p.id}</td>
                <td style="font-weight: 500;">${p.name}</td>
                <td>$${Number(p.price).toFixed(2)}</td>
                <td>
                    <span class="badge" style="background: ${p.quantity <= p.min_stock ? '#fee2e2' : '#d1fae5'}; 
                          color: ${p.quantity <= p.min_stock ? '#ef4444' : '#10b981'};">
                        ${p.quantity} Unit(s)
                    </span>
                </td>
                <td class="text-secondary">${p.supplier_name || '-'}</td>
                <td>
                    <button class="btn btn-sm" style="background: #e5e7eb; color: #374151;" onclick="window.editProduct(${p.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="window.deleteProduct(${p.id})">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    window.showProductModal = function() {
        document.getElementById('product-form').reset();
        document.getElementById('product-id').value = '';
        document.getElementById('product-qty').value = '0';
        document.getElementById('product-modal-title').textContent = 'Add Product';
        document.getElementById('product-modal').classList.add('active');
    }
    window.closeProductModal = function() {
        document.getElementById('product-modal').classList.remove('active');
    }
    window.editProduct = function(id) {
        const product = currentProducts.find(p => p.id === id);
        if (product) {
            document.getElementById('product-id').value = product.id;
            document.getElementById('product-name').value = product.name;
            document.getElementById('product-price').value = product.price;
            document.getElementById('product-min-stock').value = product.min_stock;
            document.getElementById('product-desc').value = product.description || '';
            document.getElementById('product-modal-title').textContent = 'Edit Product';
            document.getElementById('product-modal').classList.add('active');
        }
    }
    window.deleteProduct = async function(id) {
        if(confirm('Are you sure you want to delete this product?')) {
            try {
                await ApiService.deleteProduct(id);
                window.app.showToast('Product deleted');
                loadProducts();
            } catch(err) { window.app.showToast(err.message, 'error'); }
        }
    }

    window.generateDemoProduct = async function() {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/products/demo', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if(res.ok) { window.app.showToast(data.message, 'success'); loadProducts(); } 
            else { window.app.showToast(data.error, 'error'); }
        } catch(err) { window.app.showToast('Demo generation failed', 'error'); }
    }

    window.clearDemoProducts = async function() {
        if(!confirm('Are you sure you want to delete all Demo Products?')) return;
        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/products/demo', { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if(res.ok) { window.app.showToast(data.message, 'success'); loadProducts(); } 
            else { window.app.showToast(data.error, 'error'); }
        } catch(err) { window.app.showToast('Data purge failed', 'error'); }
    }
</script>
