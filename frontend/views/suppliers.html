<div class="fade-in">
    <div class="flex justify-between items-center mb-4">
        <h1>Suppliers Directory</h1>
        <button class="btn btn-primary" onclick="window.showSupplierModal()">+ Add Supplier</button>
    </div>

    <div class="card" style="padding: 0;">
        <div class="table-container" style="margin-top: 0;">
            <table class="table" id="suppliers-table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Contact / Phone</th>
                        <th>Email</th>
                        <th>Location</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Injected via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Edit Supplier Modal -->
<div class="modal-overlay" id="supplier-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="supplier-modal-title">Add Supplier</h3>
            <button class="modal-close" onclick="window.closeSupplierModal()">&times;</button>
        </div>
        <form id="supplier-form">
            <input type="hidden" id="supplier-id">
            <div class="form-group">
                <label>Supplier Name</label>
                <input type="text" id="supplier-name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Phone / Contact Person</label>
                <input type="text" id="supplier-contact" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="supplier-email" class="form-control">
            </div>
            <div class="form-group">
                <label>Physical Address (Location)</label>
                <textarea id="supplier-address" class="form-control" rows="2"></textarea>
            </div>
            <button type="submit" class="btn btn-primary mt-4" style="width: 100%;">Save Supplier</button>
        </form>
    </div>
</div>

<script>
    let currentSuppliers = [];

    window.initSuppliers = async function() {
        

        await loadSuppliers();
        
        document.getElementById('supplier-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('supplier-id').value;
            const data = {
                name: document.getElementById('supplier-name').value,
                contact: document.getElementById('supplier-contact').value,
                email: document.getElementById('supplier-email').value,
                address: document.getElementById('supplier-address').value
            };
            try {
                if (id) await ApiService.updateSupplier(id, data);
                else await ApiService.createSupplier(data);
                
                window.app.showToast('Supplier saved successfully');
                closeSupplierModal();
                loadSuppliers();
            } catch (err) { window.app.showToast(err.message, 'error'); }
        });
    }

    async function loadSuppliers() {
        try {
            currentSuppliers = await ApiService.getSuppliers();
            renderSuppliers(currentSuppliers);
        } catch (err) { window.app.showToast('Failed to load suppliers', 'error'); }
    }

    function renderSuppliers(suppliers) {
        const tbody = document.querySelector('#suppliers-table tbody');
        if (suppliers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #6b7280; padding: 20px;">No suppliers found</td></tr>';
            return;
        }
        tbody.innerHTML = suppliers.map(s => `
            <tr>
                <td style="color: #6b7280;">sup${s.id}</td>
                <td style="font-weight: 500;">${s.name}</td>
                <td>${s.contact || '-'}</td>
                <td class="text-secondary">${s.email || '-'}</td>
                <td class="text-secondary">${s.address || '-'}</td>
                <td>
                    <button class="btn btn-sm" style="background: #e5e7eb; color: #374151;" onclick="window.editSupplier(${s.id})">Edit</button>
                    ${window.app.currentUser.role === 'Admin' ? `<button class="btn btn-sm btn-danger" onclick="window.deleteSupplier(${s.id})">Drop</button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    window.deleteSupplier = async function(id) {
        if(confirm('Are you sure you want to delete this supplier?')) {
            try {
                await ApiService.deleteSupplier(id);
                window.app.showToast('Supplier deleted');
                loadSuppliers();
            } catch(e) { window.app.showToast(e.message, 'error'); }
        }
    }
    
    window.showSupplierModal = function() {
        document.getElementById('supplier-form').reset();
        document.getElementById('supplier-id').value = '';
        document.getElementById('supplier-modal-title').textContent = 'Add Supplier';
        document.getElementById('supplier-modal').classList.add('active');
    }
    window.closeSupplierModal = function() {
        document.getElementById('supplier-modal').classList.remove('active');
    }
    window.editSupplier = function(id) {
        const supplier = currentSuppliers.find(s => s.id === id);
        if (supplier) {
            document.getElementById('supplier-id').value = supplier.id;
            document.getElementById('supplier-name').value = supplier.name;
            document.getElementById('supplier-contact').value = supplier.contact || '';
            document.getElementById('supplier-email').value = supplier.email || '';
            document.getElementById('supplier-address').value = supplier.address || '';
            document.getElementById('supplier-modal-title').textContent = 'Edit Supplier';
            document.getElementById('supplier-modal').classList.add('active');
        }
    }
</script>
