<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventorio - Premium Inventory Management</title>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    
    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <!-- Main Application Wrapper -->
    <div id="app" class="app-container">
        <!-- Sidebar Navigation (Hidden on Login) -->
        <aside id="sidebar" class="sidebar hidden">
            <!-- Brand -->
            <div style="display: flex; align-items: center; gap: 12px; padding: 0 12px; margin-bottom: 24px;">
                <div style="background: rgba(59, 130, 246, 0.15); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                </div>
                <div>
                    <div style="color: #f8fafc; font-weight: 600; font-size: 15px; letter-spacing: 0.5px;">DistroInv</div>
                    <div style="color: #64748b; font-size: 11px;">v2.0 Distributed</div>
                </div>
            </div>

            <!-- Profile Card -->
            <div style="background: #111827; border: 1px solid #1e293b; border-radius: 12px; padding: 12px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
                <div style="background: rgba(59, 130, 246, 0.2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #60a5fa; font-weight: 600; font-size: 13px;">U</div>
                <div>
                    <div id="sidebar-user-name" style="color: #f8fafc; font-weight: 500; font-size: 13px;">User</div>
                    <div id="sidebar-user-role" style="color: #64748b; font-size: 11px;">Admin • All Nodes</div>
                </div>
            </div>

            <!-- DB Nodes Status Tracker -->
            <div style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 4px;">
                    <div style="color: #64748b; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        DB Nodes
                    </div>
                    <div id="sidebar-nodes-count" style="color: #10b981; font-size: 11px; font-weight: 600;">3/3 Online</div>
                </div>
                <div style="display: flex; gap: 12px; color: #94a3b8; font-size: 11px; padding: 0 4px;" id="sidebar-node-indicators">
                    <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:6px; height:6px; border-radius:50%; background:#10b981;"></span> HYD</div>
                    <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:6px; height:6px; border-radius:50%; background:#10b981;"></span> CHE</div>
                    <div style="display: flex; align-items: center; gap: 4px;"><span style="display:inline-block; width:6px; height:6px; border-radius:50%; background:#10b981;"></span> BLR</div>
                </div>
            </div>

            <!-- Navigation Links -->
            <nav class="nav">
                <a href="#dashboard" class="nav-item active" data-route="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a>
                <a href="#products" class="nav-item" data-route="products">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                    Products
                </a>
                <a href="#suppliers" class="nav-item" data-route="suppliers">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Suppliers
                </a>
                <a href="#stock" class="nav-item" data-route="stock">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                    Stock Management
                </a>
                <a href="#sales" class="nav-item" data-route="sales">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    Sales
                </a>
                <a href="#purchases" class="nav-item" data-route="purchases">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                    Purchases
                </a>
                <a href="#reports" class="nav-item" data-route="reports">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Reports
                </a>
                <a href="#system" class="nav-item" data-route="system">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
                    DB Nodes
                </a>
                <a href="#logs" class="nav-item" data-route="logs">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Operation Logs
                </a>
            </nav>

            <div style="margin-top: auto;">
                <a href="#" id="global-logout-btn" class="nav-item" style="color: #94a3b8; font-weight: 500;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sign Out
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <!-- Dynamic Views Injected Here -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
